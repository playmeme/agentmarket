name: Remote Deploy

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Matches Containerfile

      - name: Run Go Tests
        run: go test -v ./...

      - name: Deploy to Server
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GITHUB_SHA,RESEND_API_KEY
          script: |
            SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)

            cd ~/agentmarket/agentmarket.git
            git pull origin main

            # Overwrite the environment file on the server to match Github secrets
            cat <<EOF > ~/.config/containers/webapp.env
            RESEND_API_KEY=${RESEND_API_KEY}
            EOF

            # Build and restart
            podman build --build-arg VERSION=$SHORT_SHA -t localhost/webapp-image .
            systemctl --user daemon-reload
            systemctl --user restart webapp.service
            podman image prune -f
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Notify Discord
        if: always()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: ${{ job.status == 'success' && 'info' || 'error' }}
          details: "Deployment of `${{ github.sha }}` to agentictemp.com: ${{ job.status }}"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}