name: Remote Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ==========================================
  # Detect which parts of the codebase changed
  # ==========================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'ops/**'
              - 'Containerfile'
            frontend:
              - 'frontend/**'

  # ==========================================
  # BACKEND: Run Tests & Deploy (Only if backend changed)
  # ==========================================
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Matches Containerfile

      - name: Run Go Tests
        run: cd backend && go test -v ./...

      - name: Deploy Backend to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GITHUB_SHA,DATABASE_URL,JWT_SECRET,RESEND_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET
          script: |
            set -e
            SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)

            cd ~/agentmarket/agentmarket.git
            git pull origin main

            # Overwrite the environment file on the server to match Github secrets
            cat <<EOF > ~/.config/containers/webapp.env
            SHORT_SHA=${SHORT_SHA}
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            RESEND_API_KEY=${RESEND_API_KEY}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            EOF

            # Build and restart
            podman build --no-cache --build-arg VERSION=$SHORT_SHA -t localhost/webapp-image .

            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            systemctl --user daemon-reload
            systemctl --user restart webapp.service
            podman image prune -f
        env:
          DATABASE_URL: "./data/agentmarket.db"
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GITHUB_SHA: ${{ github.sha }}

  # ==========================================
  # FRONTEND: Build & Deploy (Only if frontend changed)
  # Runs independently of backend — a backend failure won't block frontend deployment.
  # Static files are copied to a host directory that is bind-mounted into the container
  # via the Quadlet config (see ops/webapp.container).
  # ==========================================
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      STATIC_TMP: "~/agentmarket/static_tmp"
      STATIC_DIR: "~/agentmarket/static"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Svelte Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Prepare Temp Directory on Server
        # Need to use a temp dir so we don't change the inode ID of the static dir
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: mkdir -p ${{ env.STATIC_TMP }}

      - name: Copy Build Artifacts to Temp Directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/build/*"
          # Host path that is bind-mounted into the container (see ops/webapp.container Volume=)
          target: "${{ env.STATIC_TMP }}"
          strip_components: 2 # Strips "frontend/build/" from the destination path
          rm: true
          timeout: "3m"

      - name: Atomic Sync to Live Directory & Update Repo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # rsync preserves the inode. Both src&dest have trailing slashes.
            rsync -a --delete ${{ env.STATIC_TMP }}/ ${{ env.STATIC_DIR }}/

            cd ~/agentmarket/agentmarket.git
            git pull origin main

  # ==========================================
  # NOTIFY: Discord Alert (runs after both deploy jobs)
  # ==========================================
  notify:
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: rjstone/discord-webhook-notify@v1
        with:
          text: "Deployed to agentictemp.com (backend: ${{ needs.deploy-backend.result }}, frontend: ${{ needs.deploy-frontend.result }})"
          details: "Deployment of `${{ github.sha }}` to agentictemp.com — backend: ${{ needs.deploy-backend.result }}, frontend: ${{ needs.deploy-frontend.result }}"
          severity: ${{ (needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure') && 'error' || 'info' }}
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

